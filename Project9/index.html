<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Information Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light" id="main-body">
    <nav class="navbar navbar-expand-lg navbar-light bg-primary px-3">
      <a class="navbar-brand text-white fw-bold" href="#">Weather Portal</a>
      <button class="btn btn-outline-light ms-auto" id="toggle-mode">
        Dark Mode
      </button>
    </nav>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card shadow-lg p-4" id="weather-card">
            <h2 class="mb-4 text-center">Current Weather (Mumbai)</h2>
            <div id="weather-info" class="text-center">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
            </div>
            <div class="d-flex justify-content-center gap-3 mt-4">
              <button class="btn btn-primary" id="fetch-xhr">
                Get Weather (XHR)
              </button>
              <button class="btn btn-success" id="fetch-fetch">
                Get Weather (Fetch)
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
