<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Information Portal (REST API)</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light" id="main-body">
    <nav class="navbar navbar-expand-lg navbar-light bg-primary px-3">
      <a class="navbar-brand text-white fw-bold" href="#"
        >Weather Portal (REST API)</a
      >
      <button class="btn btn-outline-light ms-auto" id="toggle-mode">
        Dark Mode
      </button>
    </nav>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
          <div class="card shadow-lg p-4" id="weather-card">
            <h2 class="mb-4 text-center">Weather Records</h2>
            <form id="city-form" class="mb-4">
              <div class="input-group">
                <input
                  type="text"
                  class="form-control"
                  id="city-input"
                  placeholder="Enter city name (e.g. Mumbai)"
                  required
                />
                <button class="btn btn-primary" type="submit">Add City</button>
              </div>
            </form>
            <div id="weather-list" class="row g-3 justify-content-center">
              <!-- Weather cards will be inserted here -->
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
